project:
  name: project-ares
  languages:
    - java
    - javascript
    - typescript

indexing:
  strategy: ast_chunking
  targets:
    - language: java
      include:
        - "src/main/java/**/*.java"
      exclude:
        - "**/test/**"
        - "**/generated/**"

    - language: javascript
      include:
        - "src/**/*.js"
        - "src/**/*.jsx"
      exclude:
        - "**/node_modules/**"
        - "**/dist/**"
        - "**/*.test.js"

vector_store:
  provider: postgres
  connection_string: "postgresql://${DB_USER}:${DB_PASSWORD}@localhost:5432/${DB_NAME}"
  table_name: "ares_blocks"