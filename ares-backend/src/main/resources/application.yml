server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 200

spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:ares}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

ares:
  inference-worker:
    url: ${INFERENCE_WORKER_URL:http://ares-inference-worker:8000}